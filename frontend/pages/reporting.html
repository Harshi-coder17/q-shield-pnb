<!-- frontend/pages/reporting.html — Standalone HTML (no Django templates) -->
<!DOCTYPE html>
<html lang='en' id='html-root'>
<head>
  <meta charset='UTF-8'><title>Q-Shield | Reporting</title>
  <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css'>
  <link rel='stylesheet' href='../static/css/qshield.css'>
  <script src='../static/js/qshield.js'></script>
</head>
<body>
  <div id='app-layout'></div>
  <div id='page-content' style='display:none'>
    <div class='row g-3 mb-4'>
      <!-- On-Demand Reports -->
      <div class='col-md-4'><div class='stat-card'>
        <div class='fw-bold mb-1' style='color:#1B2A4A'>On-Demand Reports</div>
        <div class='small text-muted mb-3'>Export current scan results immediately</div>
        <div class='d-grid gap-2'>
          <button class='btn btn-warning fw-bold' onclick="window.open(qshield.API_BASE+'/api/export/pdf/')">Download PDF Report</button>
          <button class='btn btn-outline-secondary' onclick="window.open(qshield.API_BASE+'/api/export/csv/')">Download CSV</button>
          <button class='btn btn-outline-secondary' onclick="window.open(qshield.API_BASE+'/api/export/json/')">Download JSON (CBOM)</button>
        </div>
      </div></div>
      <!-- Scheduled Reports -->
      <div class='col-md-4'><div class='stat-card'>
        <div class='fw-bold mb-1' style='color:#1B2A4A'>Scheduled Reports</div>
        <div class='small text-muted mb-3'>Automated daily scan at 02:00 UTC</div>
        <div class='d-flex align-items-center gap-2 mb-3'>
          <span class='badge-quantum-safe'>ACTIVE</span>
          <span class='small'>Daily scan — 02:00 UTC</span>
        </div>
        <div id='schedule-list' class='small'></div>
      </div></div>
      <!-- Executive Briefing -->
      <div class='col-md-4'><div class='stat-card'>
        <div class='fw-bold mb-1' style='color:#1B2A4A'>Executive Briefing</div>
        <div class='small text-muted mb-3'>High-level summary for management</div>
        <div id='exec-summary' class='small'></div>
        <div class='mt-3'>
          <button class='btn btn-sm btn-warning fw-bold w-100' onclick="window.open(qshield.API_BASE+'/api/export/pdf/')">Export Executive PDF</button>
        </div>
      </div></div>
    </div>
    <!-- Recent Activity Table -->
    <div class='stat-card'>
      <div class='fw-bold mb-3'>Recent Scan Activity</div>
      <table class='qshield-table'>
        <thead><tr><th>Time</th><th>Asset</th><th>Score</th><th>Label</th><th>HNDL Risk</th></tr></thead>
        <tbody id='activity-tbody'></tbody>
      </table>
    </div>
  </div>
  <script>
  document.addEventListener('DOMContentLoaded', async () => {
    await qshield.init('reporting');
    document.getElementById('page-content').style.display = 'block';
    const [summary, results] = await Promise.all([qshield.api('/api/summary/'), qshield.api('/api/results/')]);
    document.getElementById('exec-summary').innerHTML = `
      <div class='mb-1'>Total Assets: <strong>${summary.total}</strong></div>
      <div class='mb-1'>Enterprise Score: <strong>${summary.enterprise_score}/1000</strong> (${summary.enterprise_tier})</div>
      <div class='mb-1'>Avg Quantum Score: <strong>${summary.avg_score}/100</strong></div>
      <div class='mb-1'>Expiring Certs (30d): <strong class='text-warning'>${summary.expiring_certs||0}</strong></div>
      <div>Expired Certs: <strong class='text-danger'>${summary.expired_certs||0}</strong></div>`;
    document.getElementById('activity-tbody').innerHTML = results.slice(0,15).map(r=>{
      const lc = qshield.getLabelClass(r.label);
      const rc = qshield.getRiskClass(r.hndl_risk);
      return `<tr>
        <td style='font-size:11px'>${r.scanned_at?new Date(r.scanned_at).toLocaleString():'--'}</td>
        <td><strong>${r.hostname}</strong></td>
        <td><strong style='color:${(r.quantum_score||0)>=60?"#27AE60":"#E74C3C"}'>${r.quantum_score||0}/100</strong></td>
        <td><span class='${lc}'>${r.label||'--'}</span></td>
        <td><span class='${rc}'>${r.hndl_risk||'--'}</span></td></tr>`;
    }).join('');
  });
  </script>
</body></html>
